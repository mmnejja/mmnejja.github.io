<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSRD Reporting Simulation</title>
    <style>
      :root {
        --bg-primary: #0b1020;
        --bg-secondary: #111a2f;
        --bg-card: rgba(19, 30, 54, 0.9);
        --text-primary: #e8eefc;
        --text-secondary: #9fb0d8;
        --accent: #2cb1a0;
        --accent-hover: #39c4b1;
        --danger: #ff6b7b;
        --success: #58d68d;
        --border: rgba(159, 176, 216, 0.22);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "SF Pro Display", "Helvetica Neue", sans-serif;
        color: var(--text-primary);
        background:
          radial-gradient(circle at 15% 20%, rgba(44, 177, 160, 0.16), transparent 35%),
          radial-gradient(circle at 80% 10%, rgba(88, 214, 141, 0.12), transparent 30%),
          linear-gradient(135deg, #060a16 0%, #0b1020 45%, #131f3b 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .page {
        width: 100%;
        max-width: 760px;
        animation: fadeUp 0.7s ease both;
      }

      .top-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 14px;
      }

      .live-btn {
        text-decoration: none;
        color: var(--text-primary);
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 600;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .live-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(88, 214, 141, 0.5);
        background: rgba(88, 214, 141, 0.08);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 30px;
        backdrop-filter: blur(8px);
        transition: box-shadow 0.25s ease, transform 0.25s ease;
      }

      .card:hover {
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        transform: translateY(-2px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.65rem, 2.9vw, 2.15rem);
        letter-spacing: 0.2px;
      }

      .description {
        margin: 14px 0 0;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      .tools {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(44, 177, 160, 0.14);
        border: 1px solid rgba(44, 177, 160, 0.35);
        color: #bdebe4;
        font-size: 0.9rem;
      }

      .tools strong {
        color: var(--text-primary);
      }

      form {
        margin-top: 26px;
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 0.92rem;
        color: #c6d3f2;
      }

      input[type="text"],
      input[type="email"],
      input[type="file"] {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        color: var(--text-primary);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input[type="file"] {
        padding: 10px;
      }

      input:focus {
        border-color: rgba(44, 177, 160, 0.8);
        box-shadow: 0 0 0 3px rgba(44, 177, 160, 0.2);
      }

      .submit-btn {
        margin-top: 8px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(120deg, #1f8f83 0%, #2cb1a0 55%, #58d68d 100%);
        color: #04110f;
        font-weight: 700;
        font-size: 0.98rem;
        padding: 13px 16px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        filter: brightness(1.06);
        box-shadow: 0 10px 28px rgba(44, 177, 160, 0.4);
      }

      .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .spinner {
        width: 17px;
        height: 17px;
        border-radius: 50%;
        border: 2px solid rgba(4, 17, 15, 0.25);
        border-top-color: #04110f;
        animation: spin 0.75s linear infinite;
        display: none;
      }

      .submit-btn.loading .spinner {
        display: inline-block;
      }

      .status {
        min-height: 22px;
        margin-top: 4px;
        font-size: 0.92rem;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .footer-note {
        margin-top: 20px;
        color: #91a5d3;
        font-size: 0.84rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .card {
          padding: 22px;
          border-radius: 16px;
        }

        .top-actions {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="top-actions">
        <a
          class="live-btn"
          href="https://csrd-reporting-simulation.onrender.com"
          target="_blank"
          rel="noopener noreferrer"
          >View Live Workflow</a
        >
      </div>

      <section class="card" aria-labelledby="csrd-title">
        <h1 id="csrd-title">CSRD Reporting Simulation</h1>
        <p class="description">
          Simulated ESG and CSRD data pipelines to support assurance-ready sustainability disclosures.
        </p>
        <p class="tools"><strong>Tools:</strong> n8n, ESG disclosures, CSRD Frameworks</p>

        <form id="esgForm" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required autocomplete="name" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>

          <div class="field">
            <label for="reportFile">Upload ESG Report (.html only)</label>
            <input id="reportFile" name="reportFile" type="file" accept=".html,text/html" required />
          </div>

          <button class="submit-btn" id="submitBtn" type="submit">
            <span class="spinner" aria-hidden="true"></span>
            <span id="submitLabel">Submit ESG Report</span>
          </button>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <p class="footer-note">Email destination: mya4ccounting@gmail.com</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init({ publicKey: "YOUR_PUBLIC_KEY" });

        const form = document.getElementById("esgForm");
        const statusEl = document.getElementById("status");
        const submitBtn = document.getElementById("submitBtn");
        const submitLabel = document.getElementById("submitLabel");
        const reportInput = document.getElementById("reportFile");

        const FIXED_SUBJECT = "CSRD Reporting";
        const TARGET_EMAIL = "mya4ccounting@gmail.com";

        function setStatus(message, type) {
          statusEl.textContent = message;
          statusEl.className = "status " + (type || "");
        }

        function setLoading(isLoading) {
          submitBtn.disabled = isLoading;
          submitBtn.classList.toggle("loading", isLoading);
          submitLabel.textContent = isLoading ? "Sending..." : "Submit ESG Report";
        }

        function readFileAsText(file) {
          return new Promise(function (resolve, reject) {
            const reader = new FileReader();
            reader.onload = function () {
              resolve(String(reader.result || ""));
            };
            reader.onerror = function () {
              reject(new Error("Could not read the uploaded file."));
            };
            reader.readAsText(file);
          });
        }

        function isHtmlFile(file) {
          if (!file) {
            return false;
          }
          const byExt = /\.html?$/i.test(file.name);
          const byMime = file.type === "text/html" || file.type === "application/xhtml+xml" || file.type === "";
          return byExt && byMime;
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          setStatus("", "");

          const name = document.getElementById("name").value.trim();
          const email = document.getElementById("email").value.trim();
          const file = reportInput.files && reportInput.files[0];

          if (!name || !email || !file) {
            setStatus("Please complete all fields and upload an HTML file.", "error");
            return;
          }

          if (!isHtmlFile(file)) {
            setStatus("Invalid file type. Please upload a valid .html file only.", "error");
            reportInput.value = "";
            return;
          }

          setLoading(true);

          try {
            const htmlContent = await readFileAsText(file);

            await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
              to_email: TARGET_EMAIL,
              subject: FIXED_SUBJECT,
              from_name: name,
              from_email: email,
              file_name: file.name,
              message: htmlContent,
              report_content: htmlContent
            });

            setStatus("Your ESG report was submitted successfully.", "success");
            form.reset();
          } catch (error) {
            setStatus("Submission failed. Please verify EmailJS settings and try again.", "error");
          } finally {
            setLoading(false);
          }
        });
      })();
    </script>
  </body>
</html>
