<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Power BI Financial Report by Mohamed MN." />
  <title>Power BI Financial Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0a2540;
      --secondary: #00a86b;
      --bg: #f5f7fa;
      --text: #11263d;
      --muted: #5f738a;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-border: #d9e3ed;
      --shadow: 0 20px 52px rgba(10, 37, 64, 0.16);
      --radius: 20px;
      --transition: 250ms ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(0, 168, 107, 0.14), transparent 32%),
        radial-gradient(circle at 86% 12%, rgba(10, 37, 64, 0.11), transparent 30%),
        linear-gradient(165deg, #f8fbff 8%, var(--bg) 58%, #e3ecf5 100%);
      padding: 1.1rem;
    }

    .topbar {
      width: min(1120px, 94%);
      margin: 0 auto;
      border: 1px solid rgba(217, 227, 237, 0.9);
      border-radius: 999px;
      padding: 0.72rem 0.92rem;
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      box-shadow: 0 10px 24px rgba(10, 37, 64, 0.09);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--primary);
    }

    .back-link {
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: #fff;
      padding: 0.5rem 0.9rem;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    }

    .back-link:hover {
      transform: translateY(-1px);
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(0, 168, 107, 0.13);
    }

    .dashboard-section {
      width: min(1120px, 94%);
      margin: 1.25rem auto 0;
      padding: clamp(1.2rem, 3.2vw, 2.2rem);
      border-radius: var(--radius);
      border: 1px solid rgba(217, 227, 237, 0.94);
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .dashboard-section::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      top: -140px;
      right: -80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 168, 107, 0.25), rgba(0, 168, 107, 0));
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      background: #22c55e;
      color: #07120b;
      padding: 0.34rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .eyebrow {
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      font-size: 0.76rem;
      margin-bottom: 0.6rem;
    }

    .dashboard-section h1 {
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: var(--primary);
    }

    .dashboard-section p {
      max-width: 64ch;
      margin: 0.9rem auto 1.4rem;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .dashboard-wrapper {
      max-width: 1200px;
      margin: auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(10, 37, 64, 0.35);
      border: 1px solid rgba(10, 37, 64, 0.16);
      background: #0f172a;
      transition: transform 0.3s ease;
      transform-origin: center;
    }

    .dashboard-wrapper:hover {
      transform: scale(1.02);
    }

    .dashboard-wrapper iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }

    @media (max-width: 768px) {
      body {
        padding: 0.45rem;
      }

      .topbar {
        width: 96%;
        border-radius: 14px;
      }

      .dashboard-section {
        width: 96%;
        margin-top: 0.7rem;
        padding: 1rem 0.75rem 1.1rem;
      }

      .dashboard-section p {
        font-size: 0.95rem;
      }

      .dashboard-wrapper iframe {
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Power BI Financial Dashboard</div>
    <a class="back-link" href="index.html">Back to Portfolio</a>
  </header>

  <section class="dashboard-section">
    <div class="badge">Live Financial Analytics</div>
    <p class="eyebrow">Power BI Report</p>
    <h1>Power BI Financial Dashboard</h1>
    <p>Analyse automatique des indicateurs financiers pour suivre la performance, la marge et la dynamique de croissance en temps reel.</p>
    
    <button id="openReportBtn" style="margin: 1.2rem auto 0; padding: 0.72rem 1.4rem; background: linear-gradient(135deg, #00a86b, #009d62); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: transform 220ms ease, filter 220ms ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.filter='brightness(1.03)'" onmouseout="this.style.transform='translateY(0)'; this.style.filter='brightness(1)'">Open Report ↗</button>

    <div class="dashboard-wrapper">
      <iframe
        title="Getting Started in Power BI"
        src="https://app.powerbi.com/view?r=eyJrIjoiYjQ2YjkxN2QtMzVmYy00MzhhLWE3MzMtY2VhNWU5YTY3MzBlIiwidCI6ImRiZDY2NjRkLTRlYjktNDZlYi05OWQ4LTVjNDNiYTE1M2M2MSIsImMiOjl9"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <script>
    const openReportBtn = document.getElementById("openReportBtn");
    if (openReportBtn) {
      openReportBtn.addEventListener("click", () => {
        window.open("https://app.powerbi.com/view?r=eyJrIjoiYjQ2YjkxN2QtMzVmYy00MzhhLWE3MzMtY2VhNWU5YTY3MzBlIiwidCI6ImRiZDY2NjRkLTRlYjktNDZlYi05OWQ4LTVjNDNiYTE1M2M2MSIsImMiOjl9", "_blank");
      });
    }
  </script>
</body>
</html>
